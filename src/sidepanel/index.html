<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./sidepanel.css">
</head>
<body class="theme-umamusume"> <!-- 預設馬娘主題 -->
    <div id="mt-sidebar-header">
        <div class="mt-top-bar">
            <div class="mt-brand">
                <svg class="mt-logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                    <path d="M8 7h6M8 11h8"/>
                </svg>
                <span>漫譯 V2.0</span>
                <span id="mt-model-badge"></span>
                <span id="mt-novel-status" style="display: none; font-size: 10px; color: #ff78a4; margin-left: 8px; font-weight: bold;">(翻譯中...)</span>
            </div>
            <div class="mt-top-actions">
                <button id="mt-options-btn" class="mt-icon-btn" title="開啟設定">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
                <button id="mt-theme-toggle" class="mt-icon-btn" title="切換主題">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
                <button id="mt-clear-btn" title="清空紀錄">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="mt-main-actions">
            <button id="mt-start-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                </svg>
                整頁翻譯
            </button>
            <button id="mt-stop-btn" style="display: none;">
                <svg class="mt-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                    <path d="M12 8v4l3 3"/>
                </svg>
                <span class="mt-pulse-text">正在翻譯... (停止)</span>
            </button>
            <button id="mt-selection-btn" title="手動框選區域翻譯 (Alt+T)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-dasharray="4 2"/>
                </svg>
                區域框選
            </button>
        </div>
        
        <div class="mt-mode-controls" style="display: flex; gap: 18px; padding: 12px 14px; border-top: 1px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.015); align-items: center; border-bottom: 2px solid var(--theme-bg-secondary);">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 13px; font-weight: 700; color: #444;">小說模式</span>
                <label class="mt-switch">
                    <input type="checkbox" id="mt-novel-mode-toggle">
                    <span class="mt-slider"></span>
                </label>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 13px; font-weight: 700; color: #444;">詞彙庫</span>
                <label class="mt-switch">
                    <input type="checkbox" id="mt-global-glossary-toggle" checked>
                    <span class="mt-slider"></span>
                </label>
            </div>
        </div>
        <div id="mt-glossary-bar" class="mt-glossary-bar" style="display: none;">
            <div id="mt-glossary-info-group">
                <span class="mt-glossary-icon">📚</span>
                <span id="mt-glossary-name">正在掃描作品...</span>
                <span id="mt-glossary-count">0 詞</span>
            </div>
            <div class="mt-glossary-actions">
                <button id="mt-manage-glossary-btn" class="mt-link-btn">管理</button>
            </div>
        </div>
    </div>

    <div class="mt-batch-controls" style="display: none; padding: 10px; background: rgba(0,0,0,0.02); border-bottom: 1px solid rgba(0,0,0,0.05);">
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <button id="mt-select-all-btn" class="mt-icon-btn" style="flex: 1; justify-content: center; font-size: 13px;">取消全選</button>
            <button id="mt-back-btn" class="mt-icon-btn" style="flex: 1; justify-content: center; font-size: 13px; color: #666;">返回</button>
        </div>
        <button id="mt-batch-trans-btn" style="width: 100%; background: var(--theme-accent); color: white; padding: 10px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px var(--theme-shadow);">
            翻譯所選 · 開啟新分頁
        </button>
    </div>

    <div id="mt-results-container">
        <!-- 選圖清單顯示區 -->
    </div>

    <div id="mt-quota-tracker">
        <div class="mt-quota-info">
            <span>今日額度消耗</span>
            <span id="mt-quota-count">0 / 0</span>
        </div>
        <div class="mt-quota-bar-bg">
            <div id="mt-quota-bar-fill" class="mt-quota-bar-fill" style="width: 0%"></div>
        </div>
    </div>

    <!-- 載入動畫層 -->
    <div id="mt-loading-overlay" style="display: none;">
        <div class="mt-loading-content">
            <img id="mt-loading-gif" src="" alt="Loading...">
            <p>正在努力搬運中...</p>
        </div>
    </div>

    <img id="mt-sidebar-bg" src="" alt="" style="display: none;">
    <script type="module" src="./main.js"></script>
</body>
</html>
