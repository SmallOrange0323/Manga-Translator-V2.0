<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫譯 — 批次翻譯結果</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <div class="page-grain"></div>

    <header class="result-header">
        <div class="header-left">
            <svg class="header-logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                <path d="M8 7h6M8 11h8"/>
            </svg>
            <div>
                <h1>批次翻譯結果 <span id="manga-title-display" style="font-size:16px; color:#666; margin-left:8px; font-weight:normal; vertical-align: middle;"></span> <span id="glossary-info-badge" class="glossary-badge"></span></h1>
                <p class="header-sub">漫譯 Manga Translator</p>
            </div>
        </div>
        <div class="actions">
            <button id="export-html-btn" class="btn-export secondary">
                儲存 HTML
            </button>
            <button id="export-pdf-btn" class="btn-export accent">
                儲存為 PDF
            </button>
            <button id="export-txt-btn" class="btn-export">
                匯出 TXT
            </button>
        </div>
    </header>

    <div id="loading-overlay" class="loading-overlay">
        <div id="main-loading-anim-container" class="loading-anim-container">
            <svg class="loading-cat" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                <path class="cat-tail" d="M10,65 Q5,55 15,45 T25,35" stroke="#8d80f1" stroke-width="6" fill="none" stroke-linecap="round" />
                <rect class="cat-body" x="25" y="30" width="50" height="30" rx="15" />
                <path class="cat-body" d="M60,25 L68,10 L75,25 Z" />
                <path class="cat-body" d="M75,25 L83,10 L90,25 Z" />
                <circle class="cat-body" cx="75" cy="35" r="18" />
                <circle class="cat-white" cx="78" cy="32" r="2.5" />
                <circle class="cat-white" cx="88" cy="32" r="2.5" />
                <rect class="cat-leg cat-leg-1" x="30" y="55" width="8" height="15" rx="4" />
                <rect class="cat-leg cat-leg-2" x="42" y="55" width="8" height="15" rx="4" />
                <rect class="cat-leg cat-leg-3" x="54" y="55" width="8" height="15" rx="4" />
                <rect class="cat-leg cat-leg-4" x="66" y="55" width="8" height="15" rx="4" />
            </svg>
        </div>
        <div id="loading-text">翻譯中… <span id="progress-text">0 / 0</span></div>
    </div>

    <main id="results-container" class="results-container"></main>

    <nav id="nav-footer" class="nav-footer" style="display:none;">
        <button id="prev-btn" class="nav-btn nav-btn--prev">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            上一話
        </button>
        <button id="next-btn" class="nav-btn nav-btn--next">
            下一話
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
        </button>
    </nav>

    <!-- 快速語彙編輯 Modal -->
    <div id="mt-glossary-modal" class="mt-modal">
        <div class="mt-modal-backdrop"></div>
        <div class="mt-modal-content">
            <div class="mt-modal-header">
                <h3>📖 新增至語彙庫</h3>
                <button class="mt-modal-close">&times;</button>
            </div>
            <div class="mt-modal-body">
                <div class="mt-input-group">
                    <label>原文 (日文)</label>
                    <input type="text" id="mt-glossary-ori" placeholder="例如：ラインフェルト">
                </div>
                <div class="mt-input-group">
                    <label>譯文 (中文)</label>
                    <input type="text" id="mt-glossary-trans" placeholder="例如：萊茵費爾特">
                </div>
                <p class="mt-modal-hint">儲存後，未來的翻譯將會優先套用此譯名。</p>
            </div>
            <div class="mt-modal-footer">
                <button id="mt-glossary-cancel" class="mt-btn-secondary">取消</button>
                <button id="mt-glossary-save" class="mt-btn-accent">儲存條目</button>
            </div>
        </div>
    </div>

    <script type="module" src="./result.js"></script>
</body>
</html>
