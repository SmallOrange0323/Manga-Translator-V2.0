<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫譯 V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --border: rgba(255,255,255,0.1);
            --text: #f8fafc;
            --muted: #94a3b8;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 280px;
            padding: 16px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .logo {
            font-size: 1.4rem;
        }

        .header-info h1 {
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-info p {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.15s ease;
            text-align: left;
            width: 100%;
        }

        .btn:active { transform: scale(0.97); }

        .btn-panel {
            background: var(--primary);
            color: white;
        }
        .btn-panel:hover { background: var(--primary-dark); }

        .btn-settings {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-settings:hover { background: rgba(255,255,255,0.08); }

        .btn-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .btn-text { flex: 1; }
        .btn-text small {
            display: block;
            font-size: 0.72rem;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 2px;
        }

        /* Status */
        #status-msg {
            font-size: 0.75rem;
            color: var(--muted);
            text-align: center;
            margin-top: 12px;
            min-height: 18px;
        }

        /* Panel not available notice */
        #panel-not-available {
            display: none;
            font-size: 0.75rem;
            color: #fbbf24;
            text-align: center;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎌</div>
        <div class="header-info">
            <h1>漫譯 V2.0</h1>
            <p>AI 漫畫翻譯擴充套件</p>
        </div>
    </div>

    <div class="btn-group">
        <button id="btn-open-panel" class="btn btn-panel">
            <div class="btn-icon">📖</div>
            <div class="btn-text">
                開啟翻譯面板
                <small>在目前分頁開啟側邊欄</small>
            </div>
        </button>

        <button id="btn-open-settings" class="btn btn-settings">
            <div class="btn-icon">⚙️</div>
            <div class="btn-text">
                開啟設定
                <small>API 金鑰、模型、語彙庫</small>
            </div>
        </button>
    </div>

    <div id="panel-not-available">
        ⚠️ 此平台不支援側邊欄，請使用設定頁。
    </div>
    <div id="status-msg"></div>

    <script src="main.js"></script>
</body>
</html>
